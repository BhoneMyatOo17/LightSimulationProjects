<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperCut</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .card {
      position: relative;
      width: 900px;
      height: 550px;
      border-radius: 20px;
      overflow: hidden;
    }

    .stack {
      position: absolute;
      inset: 0;
      cursor: pointer;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(129, 164, 228, 0.6);
      background: transparent;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      animation: ripple-expand 1.2s ease-out forwards;
    }

    @keyframes ripple-expand {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0.7;
        border-width: 4px;
      }

      100% {
        transform: translate(-50%, -50%) scale(6);
        opacity: 0;
        border-width: 0.5px;
      }
    }

    .stack-grey {
      filter: grayscale(100%);
    }

    .layer {
      position: absolute;
      top: -20px;
      left: -20px;
      width: calc(100% + 40px);
      height: calc(100% + 40px);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.35));
    }

    .texture-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      mix-blend-mode: overlay;
      opacity: 0.4;
      pointer-events: none;
    }

    .stack-color .layer {
      mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
    }

    @keyframes float-bounce {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(var(--float-amount));
      }
    }

    .layer {
      animation: float-bounce var(--float-duration) ease-in-out infinite;
      animation-delay: var(--float-delay);
    }

    .layer[data-depth="0"] {
      --float-amount: -3px;
      --float-duration: 7s;
      --float-delay: 0s;
    }

    .layer[data-depth="1"] {
      --float-amount: -4px;
      --float-duration: 6s;
      --float-delay: 0.3s;
    }

    .layer[data-depth="2"] {
      --float-amount: -5px;
      --float-duration: 5.5s;
      --float-delay: 0.6s;
    }

    .layer[data-depth="3"] {
      --float-amount: -6px;
      --float-duration: 5s;
      --float-delay: 0.9s;
    }

    .layer[data-depth="4"] {
      --float-amount: -7px;
      --float-duration: 4.5s;
      --float-delay: 1.2s;
    }
  </style>
</head>

<body class="flex justify-center items-center h-screen">
  <div class="card" id="card">

    <div class="stack stack-grey">
      <div class="layer" style="background-color:#255788;" data-depth="0"></div>
      <div class="layer" style="background-image:url('img/layer1.png');" data-depth="1"></div>
      <div class="layer" style="background-image:url('img/layer2.png');" data-depth="2"></div>
      <div class="layer" style="background-image:url('img/layer3.png');" data-depth="3"></div>
      <div class="layer" style="background-image:url('img/layer4.png');" data-depth="4"></div>
    </div>

    <div class="stack stack-color">
      <div class="layer" style="background-color:#255788;" data-depth="0"></div>
      <div class="layer" style="background-image:url('img/layer1.png');" data-depth="1"></div>
      <div class="layer" style="background-image:url('img/layer2.png');" data-depth="2"></div>
      <div class="layer" style="background-image:url('img/layer3.png');" data-depth="3"></div>
      <div class="layer" style="background-image:url('img/layer4.png');" data-depth="4"></div>
    </div>

    <img src="img/watercolor-texture.jpg" class="texture-overlay" />
  </div>
  <script src="papercut.js"></script>
</body>

</html>
