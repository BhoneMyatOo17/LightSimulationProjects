<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperCut</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="papercut.css">
</head>

<body class="flex justify-center items-center h-screen">
  <div class="card" id="card">

    <div class="stack stack-grey">
      <div class="layer" style="background-color:#255788;" data-depth="0"></div>
      <div class="layer" style="background-image:url('img/layer1.png');" data-depth="1"></div>
      <div class="layer" style="background-image:url('img/layer2.png');" data-depth="2"></div>
      <div class="layer" style="background-image:url('img/layer3.png');" data-depth="3"></div>
      <div class="layer" style="background-image:url('img/layer4.png');" data-depth="4"></div>
    </div>

    <div class="stack stack-color">
      <div class="layer" style="background-color:#255788;" data-depth="0"></div>
      <div class="layer" style="background-image:url('img/layer1.png');" data-depth="1"></div>
      <div class="layer" style="background-image:url('img/layer2.png');" data-depth="2"></div>
      <div class="layer" style="background-image:url('img/layer3.png');" data-depth="3"></div>
      <div class="layer" style="background-image:url('img/layer4.png');" data-depth="4"></div>
    </div>

    <img src="img/watercolor-texture.jpg" class="texture-overlay" />
  </div>
  <script src="papercut.js"></script>
</body>

</html>
